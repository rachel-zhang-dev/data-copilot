# Fly.io configuration for the data-copilot Next.js front-end.
#
# Deploy from the repo root:
#
#   fly deploy -c apps/web/fly.toml --dockerfile apps/web/Dockerfile
#
# Configuration:
#
#   fly secrets set -a data-copilot-web \
#     API_BASE_URL=https://data-copilot-api.fly.dev

app = "data-copilot-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  # Local-only health check; we don't include the upstream probe so
  # the front-end stays "alive" even if the API is asleep.
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
